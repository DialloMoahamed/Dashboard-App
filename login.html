<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>

<body>
    <div class="bg"></div>
    <div class="bg bg2"></div>
    <div class="bg bg3"></div>
    <div class="bg bg4"></div>
    <div class="card d-flex align-items-center border-white text-white justify-content-center position-absolute top-50 start-50 translate-middle"
        style="width: 25rem; background-color:#818181ae">
        <div class="card-body w-100">
            <form class="">
                <div class="d-flex justify-content-center align-items-center mb-3">
                    <img class="w-75" src="Images/Logo (1).svg" alt="">
                </div>
                <h4>Se Connecter</h4>
                <div class="mb-3">
                    <label for="exampleInputEmail1" class="form-label">Email</label>
                    <input type="email" required class="form-control text-white border-white" style="background-color: #818181ae"
                        id="exampleInputEmail1" aria-describedby="emailHelp">
                </div>
                <div class="mb-3">
                    <label for="exampleInputPassword1" class="form-label">Mot de passe</label>
                    <input type="password" required class="form-control text-white border-white"
                        style="background-color: #818181ae" id="exampleInputPassword1">
                </div>
                <div class="d-flex justify-content-center mb-2">
                    <a href="index.html"><button type="button" style="background-color: #FF7230;"
                            class="btn text-white">Se Connecter</button></a>
                </div>
                <div class="d-flex justify-content-center align-items-center">
                    <span style="font-size: small;">ou continuez avec</span>
                </div>
                <div class="d-flex justify-content-center align-items-center gap-5 mt-3 ">
                    <span style="background-color: #FF7230; width: 60px; height: 60px;"
                        class="d-flex justify-content-center align-items-center fs-4 rounded"><i
                            class="bi bi-google"></i></span>
                    <span style="background-color: #FF7230; width: 60px; height: 60px;"
                        class="d-flex justify-content-center align-items-center fs-4 rounded"><i
                            class="bi bi-github"></i></span>
                    <span style="background-color: #FF7230; width: 60px; height: 60px;"
                        class="d-flex justify-content-center align-items-center fs-4 rounded"><i
                            class="bi bi-facebook"></i></span>
                </div>
                <div class="d-flex justify-content-center align-items-center mt-3 text-center">
                    <span style="font-size: small;">Si vous n'avez pas de compte veuilleze contactez un
                        administrateur.</span>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
